spring:
  application:
    name: transaction-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/fintech}
      auto-index-creation: false              # indexes are managed by Mongock migrations
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    # Producer wire-config is set imperatively in KafkaConfig.java — see events.spec §6.1.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/fintech}

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    tags:
      service: transaction-service
  tracing:
    sampling:
      probability: 1.0                        # 100% during dev; lower in prod

outbox:
  publisher:
    tick-millis: 200
    batch-size: 100
    send-timeout-millis: 5000
    lease-duration-seconds: 5
    max-attempts: 10

transactions:
  limits:
    per-tx-max-amount: 100000000              # 1,000,000.00 in minor units
    per-day-max-amount: 1000000000
    # step-up-threshold-amount removed per ADR-0006 (MFA out of scope for the test deliverable)
  idempotency:
    retention-hours: 24

app:
  version: ${APP_VERSION:0.1.0-SNAPSHOT}

logging:
  level:
    root: INFO
    com.example.fintech: DEBUG
    org.springframework.kafka: WARN
    org.mongodb.driver: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","correlationId":"%X{correlationId:-}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","logger":"%logger","message":"%msg"}%n'
