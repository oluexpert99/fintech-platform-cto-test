spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/fintech}
      auto-index-creation: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/fintech}
  main:
    # Allow web + webflux side-by-side (the auth-service uses MVC for the API but webflux WebClient for outbound calls)
    web-application-type: servlet

server:
  port: ${SERVER_PORT:8080}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    tags:
      service: auth-service

keycloak:
  server-url: ${KEYCLOAK_BASE_URL:http://keycloak:8080}
  realm: ${KEYCLOAK_REALM:fintech}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:auth-service}
  admin-client-secret: ${KEYCLOAK_ADMIN_SECRET:dev-only-secret-not-for-prod}
  token-cache-ttl-seconds: 240

app:
  version: ${APP_VERSION:0.1.0-SNAPSHOT}

logging:
  level:
    root: INFO
    com.example.fintech: DEBUG
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","service":"${spring.application.name}","correlationId":"%X{correlationId:-}","logger":"%logger","message":"%msg"}%n'
