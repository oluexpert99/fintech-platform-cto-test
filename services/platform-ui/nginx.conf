server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — react-router uses BrowserRouter (HTML5 history), so any
    # unknown path must serve index.html rather than 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted assets; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Lightweight liveness endpoint for the compose healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
