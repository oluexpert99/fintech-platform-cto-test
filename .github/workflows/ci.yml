# Per-PR pipeline — see specs/ci.spec.md §3.1 for the contract.
#
# Stages: build → lint → static analysis → tests (unit + integration with Testcontainers) →
# dependency CVE scan → container build → Trivy scan → SBOM → compose smoke.

name: PR pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify formatting + compilation
        run: mvn -B -ntp -DskipTests verify -DskipITs

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Run integration tests (Testcontainers)
        run: mvn -B -ntp verify -DskipUTs

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            services/*/target/surefire-reports/
            services/*/target/failsafe-reports/
          retention-days: 7

  static-analysis:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: OWASP Dependency-Check
        run: mvn -B -ntp org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 || true
        continue-on-error: true
        # TODO: flip continue-on-error to false once the suppression file is curated.

  schema-compatibility:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - name: Validate event schemas exist
        run: |
          set -e
          ls events/schemas/_envelope.v1.json
          for f in events/schemas/*-value.v1.json; do
            python3 -c "import json,sys; json.load(open('$f'))"
          done
        # TODO: register against a Testcontainers Apicurio and assert BACKWARD compatibility
        # against the previously-registered version. See specs/events.spec.md §3.1.

  pinning-checks:
    runs-on: ubuntu-22.04
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Reject :latest image tags in compose
        run: |
          if grep -E '^\s*image:.*:latest' docker-compose*.yml; then
            echo "FAIL: an image with the :latest tag is present"
            exit 1
          fi
          echo "OK: no :latest tags"

  container-images:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - account-service
          - transaction-service
          - accounting-service

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:main
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Sign image (cosign keyless)
        uses: sigstore/cosign-installer@v3
      - name: cosign sign
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
