# FinTech platform — local docker-compose. See specs/docker-compose.spec.md for the full contract.
#
# Boot the platform:
#   docker compose up -d
# Wait for readiness (≤ 90s on 4-core / 8 GB):
#   until curl -fs http://localhost:8080/actuator/health > /dev/null; do sleep 2; done
# Demo end-to-end:
#   ./scripts/demo-happy-path.sh
# Observability overlay:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

name: fintech

networks:
  fintech-net:
    driver: bridge

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  kafka-data:
  keycloak-data:
  vault-data:

services:

  # ============================================================================================
  # Data tier
  # ============================================================================================

  mongo1:
    image: mongo:7.0.14
    container_name: fintech-mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports: ["27017:27017"]
    volumes: ["mongo1-data:/data/db"]
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo2:
    image: mongo:7.0.14
    container_name: fintech-mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes: ["mongo2-data:/data/db"]
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo3:
    image: mongo:7.0.14
    container_name: fintech-mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes: ["mongo3-data:/data/db"]
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:7.0.14
    container_name: fintech-mongo-init
    depends_on:
      mongo1: { condition: service_healthy }
      mongo2: { condition: service_healthy }
      mongo3: { condition: service_healthy }
    volumes:
      - ./infra/mongo/init-replica-set.js:/scripts/init.js:ro
    networks: [fintech-net]
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        echo "Waiting for mongo1...";
        until mongosh --host mongo1:27017 --quiet --eval 'db.adminCommand({ping:1})' >/dev/null 2>&1; do sleep 1; done;
        echo "Running init-replica-set.js";
        mongosh --host mongo1:27017 /scripts/init.js;

  kafka:
    image: bitnamilegacy/kafka:3.7.1
    container_name: fintech-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes: ["kafka-data:/bitnami/kafka"]
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: fintech-redis
    ports: ["6379:6379"]
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================================================================
  # Identity
  # ============================================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: fintech-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME: keycloak
      KC_HTTP_ENABLED: "true"
    ports: ["8090:8080"]
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '\"status\":\\s*\"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ============================================================================================
  # Application services
  # ============================================================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: fintech-gateway
    ports: ["8080:8080", "9080:8081"]
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fintech
      AUTH_SERVICE_URL: http://auth-service:8080
      ACCOUNT_SERVICE_URL: http://account-service:8080
      ACCOUNTING_SERVICE_URL: http://accounting-service:8080
      TRANSACTION_SERVICE_URL: http://transaction-service:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MANAGEMENT_PORT: "8081"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      keycloak: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: fintech-auth
    ports: ["9081:8081"]
    environment:
      MONGO_URI: "mongodb://fintech_writer:dev_writer_password@mongo1:27017,mongo2:27017,mongo3:27017/fintech?replicaSet=rs0&authSource=fintech"
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fintech
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_SECRET: dev-only-secret-not-for-prod
      MANAGEMENT_PORT: "8081"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      mongo-init: { condition: service_completed_successfully }
      kafka:      { condition: service_healthy }
      keycloak:   { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  account-service:
    build:
      context: .
      dockerfile: services/account-service/Dockerfile
    container_name: fintech-account
    ports: ["9082:8081"]
    environment:
      MONGO_URI: "mongodb://fintech_writer:dev_writer_password@mongo1:27017,mongo2:27017,mongo3:27017/fintech?replicaSet=rs0&authSource=fintech"
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fintech
      MANAGEMENT_PORT: "8081"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      mongo-init: { condition: service_completed_successfully }
      kafka:      { condition: service_healthy }
      keycloak:   { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  transaction-service:
    build:
      context: .
      dockerfile: services/transaction-service/Dockerfile
    container_name: fintech-transaction
    ports: ["9083:8081"]
    environment:
      MONGO_URI: "mongodb://fintech_journal_writer:dev_journal_password@mongo1:27017,mongo2:27017,mongo3:27017/fintech?replicaSet=rs0&authSource=fintech"
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fintech
      MANAGEMENT_PORT: "8081"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      mongo-init: { condition: service_completed_successfully }
      kafka:      { condition: service_healthy }
      keycloak:   { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  accounting-service:
    build:
      context: .
      dockerfile: services/accounting-service/Dockerfile
    container_name: fintech-accounting
    ports: ["9084:8081"]
    environment:
      # Accounting owns its own database — `fintech_accounting`. No connection to `fintech`.
      # Read-model is materialised from Kafka events by TransactionEventsProjector.
      MONGO_URI: "mongodb://accounting_writer:dev_accounting_password@mongo1:27017,mongo2:27017,mongo3:27017/fintech_accounting?replicaSet=rs0&authSource=fintech_accounting"
      KAFKA_BOOTSTRAP: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fintech
      MANAGEMENT_PORT: "8081"
      SPRING_PROFILES_ACTIVE: compose
    depends_on:
      mongo-init: { condition: service_completed_successfully }
      kafka:      { condition: service_healthy }
      keycloak:   { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

  platform-ui:
    build:
      context: .
      dockerfile: services/platform-ui/Dockerfile
    container_name: fintech-platform-ui
    profiles: ["ui"]
    ports: ["5173:5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      gateway: { condition: service_healthy }
    networks: [fintech-net]
    restart: unless-stopped
